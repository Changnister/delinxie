  <head>
    <meta charset="utf-8" />
    <title>联系 — 谢德麟</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link

      rel="stylesheet"

    <link rel="apple-touch-icon" sizes="180x180" href="Images/apple-touch-icon.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="咨询意向、演讲邀约及其他合作事宜，欢迎联系谢德麟。" />

    <link rel="alternate" hreflang="zh-Hans" href="contact-zh.html" />
  </head>

  <body class="page-contact lang-zh">
    <div class="page-container">

      <!-- NAV START -->
      <header class="site-header">
        <div class="site-header-inner">
          <a class="wordmark" href="index-zh.html">Delin Xie</a>

          <nav class="site-nav" id="site-nav" role="navigation" aria-label="主导航">
            <a href="about-zh.html">关于</a>
            <a href="consulting-zh.html">服务</a>
            <a href="contact-zh.html" aria-current="page">联系</a>
          </nav>

          <div class="lang-switcher" aria-label="语言">
            <a href="contact.html">EN</a>
            <span class="lang-pipe" aria-hidden="true">|</span>
            <a href="contact-zh.html" class="active">中文</a>
          </div>

          <button class="hamburger" type="button" aria-label="展开导航" aria-controls="site-nav" aria-expanded="false">
            <span class="bar"></span><span class="bar"></span><span class="bar"></span>
          </button>
        </div>
      </header>
      <!-- NAV END -->

      <div class="page-hero">
        <div class="page-hero-inner">
          <span class="kicker" style="color: rgba(200,165,91,0.8);">联系方式</span>
          <h1>联系</h1>
          <p class="page-subtitle">
            期待您的来信。请简要描述您的情况与期望目标，我将亲自回复。
          </p>
        </div>
      </div>

      <main class="contact-canvas" aria-label="联系表单">
        <div class="contact-inner">

          <div class="contact-intro">
            <span class="kicker">发送询问</span>
            <div class="accent-rule"></div>
            <h2>留下您的信息</h2>
            <p>
              无论是探讨咨询合作、安排演讲活动，还是就我的工作提出问题，欢迎随时留言。所有来信均由本人亲阅。
            </p>
          </div>

          <!--
            表单接入说明：
            方案A — Netlify 表单：在 <form> 中添加 data-netlify="true"，并将 action 设为 "/thank-you"
            方案B — Formspree：将 action 设为 "https://formspree.io/f/【您的表单ID】"，method="POST"
          -->
          <form
            class="contact-form"
            action="【您的表单提交链接】"
            method="POST"
            name="contact-zh"
            aria-label="联系咨询表单"
          >
            <input type="hidden" name="form-name" value="contact-zh" />

            <div class="form-row">
              <div class="form-group">
                <label for="name">姓名 <span aria-hidden="true">*</span></label>
                <input
                  type="text"
                  id="name"
                  name="name"
                  autocomplete="name"
                  required
                  placeholder="请输入您的姓名"
                />
              </div>
              <div class="form-group">
                <label for="organisation">机构/组织</label>
                <input
                  type="text"
                  id="organisation"
                  name="organisation"
                  autocomplete="organization"
                  placeholder="公司或机构名称"
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="email">电子邮件 <span aria-hidden="true">*</span></label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  autocomplete="email"
                  required
                  placeholder="您的邮箱地址"
                />
              </div>
              <div class="form-group">
                <label for="inquiry-type">询问类型</label>
                <select id="inquiry-type" name="inquiry-type">
                  <option value="">请选择</option>
                  <option value="consulting">咨询合作</option>
                  <option value="speaking">演讲/活动邀约</option>
                  <option value="media">媒体/新闻采访</option>
                  <option value="other">其他</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="budget">预算范围（选填）</label>
              <select id="budget" name="budget">
                <option value="">暂不透露</option>
                <option value="under-10k">10,000 美元以下</option>
                <option value="10k-25k">10,000 – 25,000 美元</option>
                <option value="25k-50k">25,000 – 50,000 美元</option>
                <option value="50k-plus">50,000 美元以上</option>
              </select>
              <p class="form-note">此信息有助于我了解合作规模，确保双方真正契合后再作回复。</p>
            </div>

            <div class="form-group">
              <label for="message">您的留言 <span aria-hidden="true">*</span></label>
              <textarea
                id="message"
                name="message"
                required
                placeholder="请简要描述您的情况、期望目标及相关时间安排。"
              ></textarea>
            </div>

            <div>
              <button type="submit" class="btn btn-navy">发送 &rarr;</button>
            </div>

          </form>

          <!-- 直接联系 -->
          <div style="margin-top:48px; padding-top:40px; border-top:1px solid var(--border);">
            <span class="kicker">直接联系</span>
            <div class="accent-rule"></div>
            <p style="color:var(--text-muted); font-size:0.97rem; margin-top:4px;">
              如需直接来信，请发送至
              <a href="mailto:【您的邮箱地址】" style="color:var(--navy); font-weight:600;">【您的邮箱地址】</a>。
              我通常在两个工作日内回复。
            </p>
            <p style="color:var(--text-muted); font-size:0.97rem; margin-top:12px;">
              亦可通过
              <a href="https://www.linkedin.com/in/【LINKEDIN用户名】/" target="_blank" rel="noopener" style="color:var(--navy); font-weight:600;">LinkedIn</a>
              与我联系。
            </p>
          </div>

        </div>
      </main>

      <footer class="site-footer">
        <div class="site-footer-inner">
          <nav class="footer-nav" aria-label="页脚导航">
            <a href="about-zh.html">关于</a>
            <a href="consulting-zh.html">咨询服务</a>
            <a href="speaking-zh.html">演讲</a>
            <a href="writing-zh.html">文章</a>
            <a href="contact-zh.html" aria-current="page">联系</a>
          </nav>
          <div class="footer-right">
            <p>&copy; 2026 Zheren. All rights reserved.</p>
          </div>
        </div>
      </footer>

      <script src="navresponsive.js" defer></script>
      <script src="scripts/siteFooterYear.js" defer></script>
    </div>
  </body>
</html>
